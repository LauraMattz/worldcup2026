name: Agenda Completa - Todos os Jogos das Oitavas

on:
  schedule:
    # 29/06 - 22h Países Baixos × Marrocos (00h10 BRT = 03h10 UTC)
    - cron: '10 3 30 6 *'

    # 30/06 - 14h Costa do Marfim × Noruega (16h10 BRT = 19h10 UTC)
    - cron: '10 19 30 6 *'

    # 30/06 - 18h França × Suécia (20h10 BRT = 23h10 UTC)
    - cron: '10 23 30 6 *'

    # 30/06 - 22h México × Equador (00h10 BRT = 03h10 UTC do dia 01/07)
    - cron: '10 3 1 7 *'

    # 01/07 - 14h Inglaterra × RD Congo (16h10 BRT = 19h10 UTC)
    - cron: '10 19 1 7 *'

    # 01/07 - 18h Bélgica × Senegal (20h10 BRT = 23h10 UTC)
    - cron: '10 23 1 7 *'

    # 01/07 - 22h EUA × Bósnia (00h10 BRT = 03h10 UTC do dia 02/07)
    - cron: '10 3 2 7 *'

    # 02/07 - 14h Espanha × Áustria (16h10 BRT = 19h10 UTC)
    - cron: '10 19 2 7 *'

    # 02/07 - 18h Portugal × Croácia (20h10 BRT = 23h10 UTC)
    - cron: '10 23 2 7 *'

    # 02/07 - 22h Suíça × Argélia (00h10 BRT = 03h10 UTC do dia 03/07)
    - cron: '10 3 3 7 *'

    # 03/07 - 14h Austrália × Egito (16h10 BRT = 19h10 UTC)
    - cron: '10 19 3 7 *'

    # 03/07 - 18h Argentina × Cabo Verde (20h10 BRT = 23h10 UTC)
    - cron: '10 23 3 7 *'

    # 03/07 - 22h Colômbia × Gana (00h10 BRT = 03h10 UTC do dia 04/07)
    - cron: '10 3 4 7 *'

  workflow_dispatch:
    inputs:
      jogo:
        description: 'Qual jogo atualizar?'
        required: true
        type: choice
        options:
          - 'Países Baixos × Marrocos'
          - 'Costa do Marfim × Noruega'
          - 'França × Suécia'
          - 'México × Equador'
          - 'Inglaterra × RD Congo'
          - 'Bélgica × Senegal'
          - 'EUA × Bósnia'
          - 'Espanha × Áustria'
          - 'Portugal × Croácia'
          - 'Suíça × Argélia'
          - 'Austrália × Egito'
          - 'Argentina × Cabo Verde'
          - 'Colômbia × Gana'

jobs:
  buscar-e-atualizar:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do repositório
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependências
      run: |
        pip install requests beautifulsoup4

    - name: Configurar Git
      run: |
        git config user.name "LauraMattz"
        git config user.email "lmattos@users.noreply.github.com"

    - name: Determinar jogo e buscar resultado
      id: buscar
      run: |
        python3 << 'EOF'
        import os
        import sys
        from datetime import datetime

        # Determinar qual jogo buscar
        jogo_input = "${{ github.event.inputs.jogo }}"

        # Se for schedule, determina pelo horário e data
        if not jogo_input:
            agora = datetime.utcnow()
            dia = agora.day
            mes = agora.month
            hora = agora.hour

            # Mapear cron para jogo (baseado em dia, mês e hora UTC)
            mapa_jogos = {
                (30, 6, 3): "Países Baixos × Marrocos",
                (30, 6, 19): "Costa do Marfim × Noruega",
                (30, 6, 23): "França × Suécia",
                (1, 7, 3): "México × Equador",
                (1, 7, 19): "Inglaterra × RD Congo",
                (1, 7, 23): "Bélgica × Senegal",
                (2, 7, 3): "EUA × Bósnia",
                (2, 7, 19): "Espanha × Áustria",
                (2, 7, 23): "Portugal × Croácia",
                (3, 7, 3): "Suíça × Argélia",
                (3, 7, 19): "Austrália × Egito",
                (3, 7, 23): "Argentina × Cabo Verde",
                (4, 7, 3): "Colômbia × Gana",
            }

            jogo_input = mapa_jogos.get((dia, mes, hora))
            if not jogo_input:
                print(f"⚠️  Nenhum jogo agendado para {dia}/{mes} às {hora}h UTC")
                sys.exit(0)

        print(f"🔍 Buscando resultado de: {jogo_input}")

        # Mapear jogos
        jogos = {
            "Países Baixos × Marrocos": {"time_a": "Países Baixos", "time_b": "Marrocos", "rodada": "Oitavas (R32)"},
            "Costa do Marfim × Noruega": {"time_a": "Costa do Marfim", "time_b": "Noruega", "rodada": "Oitavas (R32)"},
            "França × Suécia": {"time_a": "França", "time_b": "Suécia", "rodada": "Oitavas (R32)"},
            "México × Equador": {"time_a": "México", "time_b": "Equador", "rodada": "Oitavas (R32)"},
            "Inglaterra × RD Congo": {"time_a": "Inglaterra", "time_b": "RD Congo", "rodada": "Oitavas (R32)"},
            "Bélgica × Senegal": {"time_a": "Bélgica", "time_b": "Senegal", "rodada": "Oitavas (R32)"},
            "EUA × Bósnia": {"time_a": "EUA", "time_b": "Bósnia", "rodada": "Oitavas (R32)"},
            "Espanha × Áustria": {"time_a": "Espanha", "time_b": "Áustria", "rodada": "Oitavas (R32)"},
            "Portugal × Croácia": {"time_a": "Portugal", "time_b": "Croácia", "rodada": "Oitavas (R32)"},
            "Suíça × Argélia": {"time_a": "Suíça", "time_b": "Argélia", "rodada": "Oitavas (R32)"},
            "Austrália × Egito": {"time_a": "Austrália", "time_b": "Egito", "rodada": "Oitavas (R32)"},
            "Argentina × Cabo Verde": {"time_a": "Argentina", "time_b": "Cabo Verde", "rodada": "Oitavas (R32)"},
            "Colômbia × Gana": {"time_a": "Colômbia", "time_b": "Gana", "rodada": "Oitavas (R32)"},
        }

        jogo = jogos.get(jogo_input)
        if not jogo:
            print(f"❌ Jogo '{jogo_input}' não encontrado")
            sys.exit(1)

        # Executar script de busca
        resultado = os.popen(f"python3 buscar_resultado.py '{jogo['time_a']}' '{jogo['time_b']}'").read()
        print(resultado)

        # Verificar se encontrou resultado
        import json
        try:
            resultado_json = json.loads(resultado)
            if "erro" in resultado_json:
                print(f"⚠️  Resultado não encontrado automaticamente")
                print(f"🔔 Será necessário adicionar manualmente via workflow 'Atualizar Resultados da Copa'")
                sys.exit(0)

            # Salvar nos outputs do GitHub
            with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write(f"placar={resultado_json['placar']}\n")
                f.write(f"vencedor={resultado_json['vencedor']}\n")
                f.write(f"time_a={jogo['time_a']}\n")
                f.write(f"time_b={jogo['time_b']}\n")
                f.write(f"rodada={jogo['rodada']}\n")
                f.write(f"encontrado=true\n")

            print(f"✅ Resultado encontrado: {resultado_json['placar']} - Vencedor: {resultado_json['vencedor']}")

        except json.JSONDecodeError:
            print(f"❌ Erro ao processar resultado")
            sys.exit(1)
        EOF

    - name: Atualizar resultado no JSON
      if: steps.buscar.outputs.encontrado == 'true'
      run: |
        python3 << 'EOF'
        import json
        import math
        from datetime import date

        # Carregar dados
        with open('resultados_copa2026.json', 'r', encoding='utf-8') as f:
            dados = json.load(f)

        # Scores do modelo
        SCORES = {
            "Espanha": 1.51, "Alemanha": 1.38, "França": 1.29, "Argentina": 1.27,
            "Brasil": 1.24, "Inglaterra": 1.21, "Países Baixos": 1.18, "Canadá": 1.15,
            "Portugal": 1.13, "Colômbia": 1.10, "Bélgica": 1.08, "Marrocos": 1.05,
            "Estados Unidos": 1.02, "México": 0.99, "Uruguai": 0.96, "Senegal": 0.93,
            "Croácia": 0.90, "Suíça": 0.88, "Japão": 0.85, "Turquia": 0.82,
            "Dinamarca": 0.79, "Equador": 0.76, "Áustria": 0.73, "Polônia": 0.70,
            "Coreia do Sul": 0.24, "Austrália": 0.21, "Costa do Marfim": 0.18,
            "Argélia": 0.15, "Gana": 0.12, "Egito": 0.09, "Bósnia e Herz.": 0.06,
            "Suécia": 0.03, "Noruega": 0.00,
            "África do Sul": -0.38, "Paraguai": -1.06, "Cabo Verde": -0.45,
            "RD Congo": -0.52, "EUA": 1.02, "Bósnia": 0.06,
        }

        def p_vitoria(time_a, time_b, k=1.5):
            sa = SCORES.get(time_a, 0.0)
            sb = SCORES.get(time_b, 0.0)
            return round(1 / (1 + math.exp(-k * (sa - sb))), 3)

        # Inputs do workflow
        time_a = "${{ steps.buscar.outputs.time_a }}"
        time_b = "${{ steps.buscar.outputs.time_b }}"
        placar = "${{ steps.buscar.outputs.placar }}".replace("-", " – ")
        vencedor = "${{ steps.buscar.outputs.vencedor }}"
        rodada = "${{ steps.buscar.outputs.rodada }}"

        # Calcular favorito
        p = p_vitoria(time_a, time_b)
        if p >= 0.5:
            favorito = time_a
            prob = p
        else:
            favorito = time_b
            prob = round(1 - p, 3)

        # Adicionar novo jogo
        dados["jogos"].append({
            "data": str(date.today()),
            "rodada": rodada,
            "time_a": time_a,
            "time_b": time_b,
            "placar": placar,
            "vencedor": vencedor,
            "favorito_modelo": favorito,
            "prob_favorito": prob,
        })

        # Salvar
        with open('resultados_copa2026.json', 'w', encoding='utf-8') as f:
            json.dump(dados, f, ensure_ascii=False, indent=2)

        print(f"✅ JSON atualizado: {time_a} {placar} {time_b} → {vencedor}")
        EOF

    - name: Atualizar HTML
      if: steps.buscar.outputs.encontrado == 'true'
      run: |
        python3 acompanhar_copa.py --html 2>&1 | grep -v "UnicodeEncodeError" || true

    - name: Commit e Push
      if: steps.buscar.outputs.encontrado == 'true'
      run: |
        git add resultados_copa2026.json index.html
        git commit -m "Atualização automática: ${{ steps.buscar.outputs.time_a }} ${{ steps.buscar.outputs.placar }} ${{ steps.buscar.outputs.time_b }}

Vencedor: ${{ steps.buscar.outputs.vencedor }}
Resultado encontrado automaticamente via web scraping

Atualizado via GitHub Actions (scheduled)"
        git push origin main

    - name: Resumo
      if: steps.buscar.outputs.encontrado == 'true'
      run: |
        echo "✅ Resultado registrado e publicado automaticamente!"
        echo "📊 Jogo: ${{ steps.buscar.outputs.time_a }} ${{ steps.buscar.outputs.placar }} ${{ steps.buscar.outputs.time_b }}"
        echo "🏆 Vencedor: ${{ steps.buscar.outputs.vencedor }}"
        echo "🔄 GitHub Pages atualizado em ~1 minuto"
